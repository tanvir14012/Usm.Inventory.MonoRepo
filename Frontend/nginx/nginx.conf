# =============================================================================
# Nginx configuration for USM Inventory — Alpine Linux
# =============================================================================
# Features:
#   • HTTP → HTTPS redirect
#   • TLS 1.2/1.3 with strong cipher suite
#   • MD5-hash fingerprinted asset CDN caching (immutable, 1-year TTL)
#   • Angular SPA fallback (index.html for all non-file routes)
#   • /api/* rewrite — requests bypass Angular and are proxied to api-gateway
#   • Gzip compression
#   • Security headers (HSTS, CSP, X-Frame-Options, …)
#   • Proxy cache for API responses (10 min TTL)
# =============================================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens   off;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_comp_level   6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/xml
        application/json application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/opentype font/otf
        application/vnd.ms-fontobject application/font-woff2;

    # ── Proxy cache zone for API responses ────────────────────────────────────
    # Stores up to 100 MB of cached API data; entries expire after 10 min idle.
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:10m
        max_size=100m
        inactive=10m
        use_temp_path=off;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── SSL / TLS ─────────────────────────────────────────────────────────
        ssl_certificate          /etc/nginx/ssl/server.crt;
        ssl_certificate_key      /etc/nginx/ssl/server.key;
        ssl_trusted_certificate  /etc/nginx/ssl/ca.crt;

        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;

        # OCSP stapling (requires ssl_trusted_certificate)
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout    5s;

        # ── Security headers ──────────────────────────────────────────────────
        # NOTE: nginx inherits add_header into child locations ONLY when the
        # child has no add_header directives of its own.  Each location block
        # below that sets its own Cache-Control also repeats the security
        # headers to ensure they are always present.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"     always;

        # ── /api/* — proxy to API Gateway (skip Angular router) ───────────────
        # All requests whose path starts with /api/ are forwarded directly to
        # the YARP API gateway; Angular's HTML5 routing is never consulted.
        location /api/ {
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options    "nosniff"                                      always;
            add_header X-Frame-Options           "SAMEORIGIN"                                   always;

            proxy_pass         http://api-gateway:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_buffering    on;
            proxy_buffer_size  16k;
            proxy_buffers      8 16k;
            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;

            # Lightweight proxy caching for safe (GET/HEAD) API responses.
            # The api-gateway or upstream services should set Cache-Control
            # headers to opt specific endpoints into caching.
            proxy_cache            api_cache;
            proxy_cache_methods    GET HEAD;
            proxy_cache_valid      200 302 10m;
            proxy_cache_valid      404      1m;
            proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock       on;
            add_header             X-Cache-Status $upstream_cache_status always;
        }

        # ── Images — MD5-hash fingerprinted CDN caching ───────────────────────
        # Angular's outputHashing:all produces content-addressed filenames such
        # as  logo.a1b2c3d4.webp  (MD5/xxHash digest embedded in the name).
        # These are served with a 1-year immutable TTL — a true CDN pattern.
        # Raw images without a hash receive the same long TTL because image
        # content is rarely changed without also renaming the file.
        location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico|bmp|tiff)$ {
            add_header Cache-Control             "public, max-age=31536000, immutable" always;
            add_header Vary                      "Accept-Encoding"                     always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options    "nosniff"                             always;
            add_header X-Frame-Options           "SAMEORIGIN"                         always;
            expires    1y;
            try_files  $uri =404;
        }

        # ── Hashed JS/CSS/font bundles — immutable CDN caching ────────────────
        # Angular build pipeline fingerprints all output bundles with a content
        # hash (8+ hex chars before the extension).  These URLs are permanent
        # and receive a 1-year immutable max-age.
        location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|ttf|otf|eot)$ {
            add_header Cache-Control             "public, max-age=31536000, immutable" always;
            add_header Vary                      "Accept-Encoding"                     always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options    "nosniff"                             always;
            expires    1y;
        }

        # ── Non-hashed JS/CSS/fonts — short-lived cache ───────────────────────
        location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
            add_header Cache-Control             "public, max-age=604800"              always;
            add_header Vary                      "Accept-Encoding"                     always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Content-Type-Options    "nosniff"                             always;
            expires    7d;
        }

        # ── index.html — never cached (SPA entry point) ───────────────────────
        # The browser must always re-fetch index.html so it picks up the latest
        # hashed bundle filenames after a deployment.
        location = /index.html {
            add_header Cache-Control             "no-cache, no-store, must-revalidate" always;
            add_header Pragma                    "no-cache"                            always;
            add_header Expires                   "0"                                   always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options           "SAMEORIGIN"                         always;
            add_header X-Content-Type-Options    "nosniff"                             always;
        }

        # ── SPA fallback — all remaining routes → index.html ─────────────────
        # Angular's client-side router handles deep-link navigation.
        location / {
            add_header Cache-Control             "no-cache, no-store, must-revalidate" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options           "SAMEORIGIN"                         always;
            add_header X-Content-Type-Options    "nosniff"                             always;
            try_files  $uri $uri/ /index.html;
        }
    }
}
