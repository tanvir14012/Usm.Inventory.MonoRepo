apiVersion: v1
kind: ConfigMap
metadata:
  name: usm-runtime-config
  namespace: usm-platform
data:
  ASPNETCORE_ENVIRONMENT: Production
  Observability__OtlpEndpoint: http://otel-collector.usm-platform.svc.cluster.local:4317
  Observability__LokiEndpoint: http://loki.usm-platform.svc.cluster.local:3100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: usm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
        - name: identity-api
          image: __ACR_LOGIN_SERVER__/identity-api:__IMAGE_TAG__
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: usm-runtime-config
---
apiVersion: v1
kind: Service
metadata:
  name: identity-api
  namespace: usm-platform
spec:
  selector:
    app: identity-api
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: usm-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: __ACR_LOGIN_SERVER__/api-gateway:__IMAGE_TAG__
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: usm-runtime-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: usm-platform
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: http
      name: http
