name: usm-inventory-platform

services:
  postgres:
    image: postgres:17
    container_name: usm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: usm-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7.4-alpine
    container_name: usm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: usm-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    depends_on:
      - otel-collector
    volumes:
      - ./Platform/Observability/Prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.1
    container_name: usm-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_METRICS_PORT:-8889}:8889"
    volumes:
      - ./Platform/Observability/OpenTelemetry/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: usm-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4319}:4317"

  loki:
    image: grafana/loki:3.1.0
    container_name: usm-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT}:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.1.0
    container_name: usm-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana

  identity-api:
    build:
      context: .
      dockerfile: ./Services/Identity/src/Identity.Api/Dockerfile
    ports:
      - "${IDENTITY_API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Observability__OtlpEndpoint: ${OTLP_ENDPOINT}
      OpenIddict__CertificatePath: /etc/usm/certs/Identity.pfx
      OpenIddict__CertificatePassword: ${OPENIDDICT_CERTIFICATE_PASSWORD}
      OpenIddict__EncryptionKey: ${OPENIDDICT_ENCRYPTION_KEY}
      Fido2__RpId: ${FIDO2_RPID}
      Fido2__RpName: ${FIDO2_RPNAME}
      Fido2__Origin: ${FIDO2_ORIGIN}

    volumes:
      - ./certs:/etc/usm/certs:ro

    depends_on:
      - postgres
      - rabbitmq

  iam-api:
    build:
      context: .
      dockerfile: ./Services/Iam/src/Iam.Api/Dockerfile
    ports:
      - "${IAM_API_PORT}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Observability__OtlpEndpoint: ${OTLP_ENDPOINT}
