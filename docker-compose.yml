name: usm-inventory-platform

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: usm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:?POSTGRES_PORT is required}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: usm-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:?RABBITMQ_PORT is required}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:?RABBITMQ_MANAGEMENT_PORT is required}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7.4-alpine
    container_name: usm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:?REDIS_PORT is required}:6379"
    volumes:
      - redis_data:/data

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: usm-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:?PROMETHEUS_PORT is required}:9090"
    depends_on:
      - otel-collector
    volumes:
      - ./Platform/Observability/Prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.106.1
    container_name: usm-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "${OTEL_COLLECTOR_GRPC_PORT:?OTEL_COLLECTOR_GRPC_PORT is required}:4317"
      - "${OTEL_COLLECTOR_HTTP_PORT:?OTEL_COLLECTOR_HTTP_PORT is required}:4318"
      - "${OTEL_COLLECTOR_METRICS_PORT:?OTEL_COLLECTOR_METRICS_PORT is required}:8889"
    volumes:
      - ./Platform/Observability/OpenTelemetry/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: usm-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_UI_PORT:?JAEGER_UI_PORT is required}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:?JAEGER_OTLP_GRPC_PORT is required}:4317"

  loki:
    image: grafana/loki:3.1.0
    container_name: usm-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:?LOKI_PORT is required}:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:11.1.0
    container_name: usm-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:?GRAFANA_PORT is required}:3000"
    depends_on:
      - prometheus
      - loki
    volumes:
      - grafana_data:/var/lib/grafana

  # ── Frontend — Angular SPA served by Nginx (Alpine) ──────────────────────────
  # • Terminates HTTPS with the server cert signed by the USM Root CA
  # • Proxies /api/* to api-gateway (bypasses Angular routing)
  # • Serves hashed static assets with 1-year immutable CDN cache headers
  nginx:
    build:
      context: .
      dockerfile: ./Frontend/Dockerfile
    container_name: usm-nginx
    restart: unless-stopped
    ports:
      - "${FRONTEND_HTTP_PORT:?FRONTEND_HTTP_PORT is required}:80"
      - "${FRONTEND_HTTPS_PORT:?FRONTEND_HTTPS_PORT is required}:443"
    volumes:
      - ./certs/ssl/server.crt:/etc/nginx/ssl/server.crt:ro
      - ./certs/ssl/server.key:/etc/nginx/ssl/server.key:ro
      - ./certs/ssl/ca.crt:/etc/nginx/ssl/ca.crt:ro
    depends_on:
      - api-gateway

  # ── API Gateway — YARP reverse proxy (Alpine) ─────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: ./Gateway/ApiGateway/Dockerfile
    container_name: usm-api-gateway
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:?API_GATEWAY_PORT is required}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Observability__OtlpEndpoint: ${OTLP_ENDPOINT}
    volumes:
      - ./certs/ssl/ca.crt:/usr/local/share/ca-certificates/usm-root-ca.crt:ro
    depends_on:
      - identity-api
      - iam-api
      - administration-api
      - storehouse-api
      - documentshare-api
      - issuereceipt-api
      - trafficsecurity-api
      - salvage-api
      - repairmaintenance-api
      - budgetplanning-api
      - communication-api
      - inspectorate-api
      - reporting-api
      - procurement-api

  # ── Backend microservices (Alpine) ────────────────────────────────────────────
  # All services mount the USM Root CA so that inter-service HTTPS calls are
  # trusted; the docker-entrypoint.sh runs update-ca-certificates on startup.

  identity-api:
    build:
      context: .
      dockerfile: ./Services/Identity/src/Identity.Api/Dockerfile
    ports:
      - "${IDENTITY_API_PORT:?IDENTITY_API_PORT is required}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ConnectionStrings__Postgres: ${POSTGRES_CONNECTION_STRING}
      RabbitMq__Host: ${RABBITMQ_HOST}
      RabbitMq__Username: ${RABBITMQ_USERNAME}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Observability__OtlpEndpoint: ${OTLP_ENDPOINT}
      OpenIddict__CertificatePath: /etc/usm/certs/Identity.pfx
      OpenIddict__CertificatePassword: ${OPENIDDICT_CERTIFICATE_PASSWORD}
      OpenIddict__EncryptionKey: ${OPENIDDICT_ENCRYPTION_KEY}
      Fido2__RpId: ${FIDO2_RPID}
      Fido2__RpName: ${FIDO2_RPNAME}
      Fido2__Origin: ${FIDO2_ORIGIN}
    volumes:
      - ./certs:/etc/usm/certs:ro
      - ./certs/ssl/ca.crt:/usr/local/share/ca-certificates/usm-root-ca.crt:ro
    depends_on:
      - postgres
      - rabbitmq

  iam-api:
